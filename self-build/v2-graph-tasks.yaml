# PHASE 6: Integration Test
# ===========================

- id: v2_e2e
  title: "End-to-end integration validation"
  tags: [phase6, e2e]
  depends_on: [v2_cli, v2_dashboard, v2_supervisor, v2_human_action]
  workflow: full
  budget:
    max_iterations: 10
    max_cost: 40.0
  variables:
    description: >
      Write src/v2/e2e.test.ts — end-to-end tests that verify the complete
      v2 system works.

      Test scenarios:

      1. Full lifecycle via CLI:
         - Create a v2 config YAML with 2 tasks (both using command actions
           so no Claude API calls needed)
         - Task 1: actions [cmd-a, cmd-b], both echo and exit 0
         - Task 2: actions [cmd-c], depends_on [task1]
         - Run via: create DB, expandConfig, create Executor, run()
         - Verify: all 3 actions completed, edges traversed, task 2 ran
           after task 1

      2. Retry loop:
         - Config with actions [develop-cmd, eval-cmd]
         - eval-cmd fails first 2 times (script with counter file), passes 3rd
         - develop-cmd [pass] → eval-cmd, eval-cmd [fail] → develop-cmd
         - Verify: 3 iterations, then completed

      3. Server API:
         - Start server programmatically
         - POST /import with config
         - GET /actions → verify created
         - POST /executor/pause → verify paused
         - POST /executor/resume → verify resumed
         - Wait for completion
         - GET /actions → all completed

      4. Human action:
         - Config with actions [cmd-a, notify]
         - notify has wait_for_response: true, command: "echo notified"
         - Start executor, verify notify enters waiting
         - POST /actions/task.notify/respond with {status: "passed"}
         - Verify action completed

      5. SSE events:
         - Connect to /events
         - Import config and run
         - Verify action_started and action_completed events received

      6. Tag operations:
         - Import config, verify auto-tags
         - GET /actions?tag=type:cmd-a → correct results
         - PATCH /actions?tag=task:task1 → bulk update works

      These tests use command actions (echo, simple scripts) — no Claude
      API calls. They verify the plumbing works end-to-end.
    develop_focus:
      - "Full lifecycle: config → expand → execute → complete"
      - "Retry loop with failure/success cycle"
      - "Server API: import, CRUD, executor control"
      - "Human action: wait → respond → complete"
      - "SSE event verification"
      - "Tag-based operations"
      - "All tests use command actions, no API calls"
