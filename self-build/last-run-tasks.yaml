      New methods on the Git class:
      1. static async clone(repo: string, branch: string, targetDir: string): Promise<Git>
         Run `git clone --branch {branch} --single-branch {repo} {targetDir}`.
         Return a new Git instance pointing at the cloned directory.
         Timeout: 300 seconds (large repos).
      2. async createBranch(name: string): Promise<void>
         Run `git checkout -b {name}`. Used to create a working branch for
