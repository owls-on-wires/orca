- id: qa_dashboard_ui
  title: "QA: Dashboard UI via Playwright"
  tags: [qa, service, ui]
  depends_on: []
  budget:
    max_iterations: 3
    max_cost: 25.0
  stages:
    develop:
      max_turns: 1
    qa:
      max_turns: 100
  variables:
    description: >
      QA-only task — do NOT modify any code in the develop stage.

      Verify the web dashboard works correctly in a real browser using the
      Playwright MCP tools. The test server is already running at
      http://localhost:7071 (started by the deploy stage).

      ### Setup

      Use the Playwright MCP tools to interact with the dashboard. Navigate
      to http://localhost:7071/ to load the dashboard.

      ### Test scenarios

      1. **Dashboard loads**: Navigate to http://localhost:7071/. Take a
         snapshot. Verify the page contains the orca dashboard UI elements
         (build list, create form, or similar). Take a screenshot to
         /tmp/orca-qa-dashboard.png and read it to visually confirm.

      2. **Create build form**: Find the create build form or UI. Fill in
         the repo field with "/tmp/orca-qa-env/project" and a name. Submit
         the form. Verify the UI updates to show the new build.

      3. **Build progress**: After creating a build, verify the dashboard
         shows the build status updating (cloning → running → completed).
         Wait a few seconds and take snapshots to observe the progress.

      4. **Build list**: Verify the build list shows the created build(s)
         with correct status indicators.

      5. **Error state**: If possible, trigger an error (e.g., create a
         build with a nonexistent repo) and verify the UI shows the
         failure state.

      ### Screenshot workflow

      After each significant interaction, take a screenshot and READ it:
      ```
      Use mcp__playwright__browser_take_screenshot to capture the page
      ```
      You are a multimodal model — examine the screenshot to verify:
      - The dashboard renders without errors
      - Build status is displayed correctly
      - Forms are functional
      - No blank pages or JavaScript errors

      Use mcp__playwright__browser_console_messages to check for JS errors.

      ### Verdict

      Return structured output:
      - status: "passed" if the dashboard loads, forms work, and builds
        are displayed correctly
      - status: "failed" if the dashboard is broken, forms don't submit,
        or build status doesn't update
      - summary: what was tested with screenshot observations
      - issues: specific UI failures (empty string if passed)
