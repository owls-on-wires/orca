- id: serve_command
  title: "Add orca serve command with REST API + SSE"
  tags: [service, core]
  depends_on: [live_task_queue]
  budget:
    max_iterations: 15
    max_cost: 80.0
  stages:
    develop:
      max_turns: 200
  eval:
    command: >-
      grep -q 'case "serve"' src/cli.ts &&
      test -f src/server.ts &&
      bun test 2>&1
    parser: exit_code
    timeout: 120
  variables:
    description: >
      Add a long-running `orca serve` command. The serve process starts an
      HTTP server on port 7070 (configurable via --port). It manages multiple
      concurrent builds, each as a child process.

      Uses REST for commands and Server-Sent Events (SSE) for streaming.
      REST is simpler than WebSockets — commands are naturally request/response,
      endpoints are curl-testable, and auth middleware works out of the box.
      SSE handles the streaming side (state updates, logs) over a single
      long-lived GET connection.

      The serve process does NOT enter any nix environment itself. When it
      receives a build request, it:
      1. Clones the repo to {data_dir}/builds/{name}/repo
      2. Writes the spec to disk if provided inline
      3. Spawns the build as a child process (with nix wrapper if configured)
      4. Watches .orca/state.json in the repo directory for state changes
      5. Streams state updates to SSE clients

      The serve process tracks active builds in memory (Map<buildId, BuildInfo>).
      BuildInfo contains: child process handle, repo path, config, SSE clients.

      Key behaviors:
      - Multiple builds can run concurrently (different repos or same repo)
      - The serve process survives individual build failures
      - Child process stdout/stderr is captured and available via SSE
      - SIGTERM causes graceful shutdown: SIGTERM all children, wait, exit

      New files:
      - src/server.ts — HTTP server, build lifecycle management
      - Add "serve" case to the switch in src/cli.ts main()

      The server should use Bun.serve() (same as display/web.ts does currently).
      Accept --data-dir flag for where to store cloned repos and build state.
      Default data dir: ./data or /data if running as root.
    develop_focus:
      - "Create src/server.ts with Bun.serve() HTTP server"
      - "Add serve command to cli.ts switch statement"
      - "Implement build lifecycle: clone → spawn → watch → stream"
      - "Track active builds in memory with Map<buildId, BuildInfo>"
      - "Handle graceful shutdown on SIGTERM"
      - "Write tests for server startup and build spawning"

- id: rest_api
  title: "REST API endpoints"
  tags: [service, core]
  depends_on: [serve_command]
  budget:
    max_iterations: 12
    max_cost: 60.0
  stages:
    develop:
      max_turns: 200
  eval:
    command: >-
      grep -q 'POST.*builds\|DELETE.*builds\|GET.*builds' src/server.ts &&
      bun test 2>&1
    parser: exit_code
    timeout: 120
  variables:
    description: >
      Implement REST API endpoints and SSE streaming in src/server.ts.

      REST endpoints (commands — request/response):

      POST /api/builds
        Body: { repo, branch?, spec?, spec_path? }
        Clone repo, write spec if inline, spawn orca run. Returns buildId.
        Response: { buildId, status: "started" }

      GET /api/builds
        List all builds with summary status.
        Response: { builds: [{ buildId, name, status, cost, ... }] }

      GET /api/builds/:id
        Get full state for a single build.
        Response: BuildState

      DELETE /api/builds/:id
        Send SIGTERM to the build's child process.
        Response: { status: "aborted" }

      POST /api/builds/:id/intervene
        Body: { action: "continue"|"skip"|"abort", note? }
        Write intervention_response.json to .orca/ directory.
        Existing polling in intervention/index.ts picks it up.
        Response: { status: "ok" }

      SSE endpoint (streaming — long-lived GET):

      GET /api/builds/:id/events
        Server-Sent Events stream for a single build. Events:
        - event: state — full BuildState on each state.json change
        - event: log — log line from child process stdout/stderr
        - event: intervention — intervention.json appeared, human input needed
        Content-Type: text/event-stream

      GET /api/events
        SSE stream for all builds. Same event types, with buildId in data.

      Implementation notes:
      - SSE is just a long-lived HTTP response with Content-Type text/event-stream.
        Bun.serve supports streaming responses via ReadableStream.
      - State watching uses fs.watch + polling fallback (same pattern as
        display/web.ts), generalized for multiple builds.
      - All endpoints return JSON with appropriate status codes.
      - Invalid buildId returns 404. Invalid body returns 400.
    develop_focus:
      - "Define TypeScript types for API request/response shapes"
      - "Implement route dispatch in Bun.serve fetch handler"
      - "POST /api/builds: clone, write spec, spawn child"
      - "GET /api/builds and GET /api/builds/:id"
      - "DELETE /api/builds/:id: kill child process"
      - "POST /api/builds/:id/intervene: write response file"
      - "GET /api/builds/:id/events: SSE with ReadableStream"
      - "Write tests for each endpoint"

