- id: live_task_queue
  title: "Live task queue with file re-reading"
  tags: [feature, core]
  depends_on: [monitor_cli_flag]
  budget:
    max_iterations: 12
    max_cost: 60.0
  stages:
    develop:
      max_turns: 200
  eval:
    command: >-
      grep -q 'checkForNewTasks\|seenIds\|taskQueue' src/engine/loop.ts &&
      bun test 2>&1
    parser: exit_code
    timeout: 120
  variables:
    description: >
      Restructure the main task loop in src/engine/loop.ts from a fixed task
      array to a mutable queue that re-reads the task file at task boundaries.

      Current behavior: tasks are loaded once and passed as a fixed array to
      runBuild(). The function iterates through them and exits when done.

      Target behavior: after each task completes, re-read the task file from
      disk, diff against completed/queued task IDs, and append any new tasks
      to the queue. This allows tasks to be added mid-build by humans, Claude
      sessions, or planner agents — no restart required.

      Implementation:
      1. Change the main task iteration in runBuild() from for...of to a while
         loop with a mutable array (taskQueue).
      2. Track completedIds (Set<string>) and seenIds (Set<string>).
      3. After each task completes, call a new checkForNewTasks() function that:
         a. Re-reads and re-resolves the task file via loadTasks()
         b. Filters out tasks already in seenIds or completedIds
         c. Validates dependencies of new tasks
         d. Appends new tasks to taskQueue
         e. Logs "Found N new tasks: [ids]" via display
      4. When selecting the next task, find the first task in the queue whose
         depends_on are all in completedIds. If none are eligible, break.
      5. At build end, if any tasks remain in the queue (blocked by failed
         deps), report them.

      The LoopOptions interface needs a new field so checkForNewTasks can
      reload the file:
        configPath: string  (already exists)

      checkForNewTasks needs access to the config and configPath to call
      loadTasks(config, configPath).

      Edge cases:
      - Duplicate task ID → skip (already in seenIds)
      - New task depends on failed task → stays in queue, reported at end
      - Task removed from file → ignore, never remove from queue
      - File read error during check → log warning, continue with existing queue

      State changes:
      - Add tasksDiscovered to BuildState — record of {taskId, discoveredAt}
        for each task, so the web UI can show when tasks were added.
      - Update state.json after discovering new tasks.
    develop_focus:
      - "Restructure runBuild() task iteration to queue-based while loop"
      - "Implement checkForNewTasks() with file re-reading and diffing"
      - "Add tasksDiscovered tracking to BuildState"
      - "Handle edge cases: duplicates, blocked tasks, file errors"
      - "Report blocked tasks at build end"
      - "Write tests in a new or existing test file"

