- id: deploy_stage
  title: "Deploy stage type in workflow loop"
  tags: [service, engine]
  depends_on: []
  budget:
    max_iterations: 10
    max_cost: 40.0
  eval:
    command: >-
      grep -q 'command.*wait_for\|deploy\|CommandStage' src/config/schema.ts &&
      grep -q 'command\|deploy' src/engine/loop.ts &&
      bun test 2>&1
    parser: exit_code
    timeout: 120
  variables:
    description: >
      Add a command-based stage type for the workflow loop. Currently the loop
      handles two stage types: "eval" (subprocess, parsed result) and everything
      else (Claude agent invocation). Add a third type: command stages that run
      a shell command without invoking Claude.

      A stage is a command stage when it has a `command` field in its stage
      config (in the stages: section of the YAML). This is different from eval,
      which is a special keyword in the loop.

      New fields on StageConfig (src/config/schema.ts):
      - command?: string — shell command to run
      - wait_for?: string — health check command, polled until exit 0
      - wait_timeout?: number — max seconds to wait for health check (default 120)

      In the loop (src/engine/loop.ts), when processing a loop stage:
      1. Check if the stage has a `command` field via resolveStage()
      2. If yes, run it as a subprocess (like eval) instead of invoking Claude
      3. If `wait_for` is set, poll it every 5 seconds until exit 0 or timeout
      4. Log the stage like any other (onStageStart, onStageEnd)
      5. If the command fails (non-zero exit), treat it like a failed stage

      Example config:
        workflow:
          loop: [eval, analyze, develop, deploy, qa]
        stages:
          deploy:
            command: "ssh server 'cd /app && git pull && docker compose up -d'"
            wait_for: "curl -sf https://test.example.com/health"
            wait_timeout: 180

      Template variables should be interpolated in both command and wait_for,
      same as eval commands (task_id, etc.).
    develop_focus:
      - "Add command, wait_for, wait_timeout to StageConfig in schema.ts"
      - "Add command stage detection and execution in loop.ts"
      - "Implement wait_for polling with timeout"
      - "Interpolate template variables in command and wait_for"
      - "Write tests for command stage execution and wait_for polling"

- id: nix_integration
  title: "Nix environment integration for serve mode"
  tags: [service]
  depends_on: [serve_command]
  budget:
    max_iterations: 10
    max_cost: 40.0
  eval:
    command: >-
      grep -q 'nix develop\|nix shell\|flake.nix\|NixConfig' src/server.ts &&
      grep -q 'NixConfig' src/config/schema.ts &&
      bun test 2>&1
    parser: exit_code
    timeout: 120
  variables:
    description: >
      When the serve process spawns a build, wrap the orca run command in
      the appropriate nix environment. Supports both nix flakes (nix develop)
      and legacy nix shell (nix shell -p).

      Resolution order:
      1. If the spec declares nix.flake (path to flake or true for repo root),
         use `nix develop {path} --command orca run {specPath}`
      2. Else if the spec declares nix.packages (list of nixpkgs),
         use `nix shell nixpkgs#{pkg1} nixpkgs#{pkg2} --command orca run ...`
      3. Else if {repoDir}/flake.nix exists (auto-detect),
         use `nix develop {repoDir} --command orca run {specPath}`
      4. Else if {repoDir}/shell.nix or {repoDir}/default.nix exists,
         use `nix-shell {repoDir}/shell.nix --run "orca run {specPath}"`
      5. Else: spawn `orca run {specPath}` directly (no nix)

      The nix wrapper is transparent — the inner orca run doesn't know it's
      inside a nix environment. All claude invocations and eval commands
      inherit the nix PATH automatically.

      Configuration in project.orca.yaml:
        # Use the repo's flake.nix (auto-detected if omitted)
        nix:
          flake: true

        # Use a flake at a specific path
        nix:
          flake: ./subdir

        # Ad-hoc packages without a flake
        nix:
          packages: [nodejs, bun, git, openssh]

        # Disable nix even if flake.nix exists
        nix:
          enable: false

      Add nix configuration types to src/config/schema.ts:
        nix?: NixConfig

        interface NixConfig {
          enable?: boolean;            // default true, set false to disable
          flake?: boolean | string;    // true = repo root, string = path
          packages?: string[];         // nixpkgs for nix shell -p
        }

      New helper function in src/server.ts (or a new src/nix.ts):
        buildNixCommand(repoDir: string, nixConfig: NixConfig | undefined, innerCmd: string[]): string[]
      Returns the full command array with nix wrapper if applicable.

      Write tests that verify command construction for each resolution path.
      Mock the filesystem checks (flake.nix exists, shell.nix exists, etc.).
      Don't require nix to be installed for tests to pass.
    develop_focus:
      - "Add NixConfig type to schema.ts"
      - "Implement buildNixCommand with resolution order"
      - "Auto-detect flake.nix, shell.nix, default.nix"
      - "Support nix develop (flakes) and nix shell -p (packages)"
      - "Support legacy nix-shell for shell.nix/default.nix"
      - "Support nix.enable: false to skip nix"
      - "Integrate into serve build spawn logic"
      - "Write tests for each resolution path (mock fs)"

