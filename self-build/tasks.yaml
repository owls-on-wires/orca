# ---------------------------------------------------------------------------
# Web UI Observability Rework
# ---------------------------------------------------------------------------
#
# Goal: surface the structured data orca already persists (state.json,
# history[], eval_result.json, JSONL logs) in the dashboard detail view.
# Currently the detail view is a raw stdout dump with progress bars.
#
# Workflow: develop → deploy → qa (no eval stage — QA is the gate)
# All tasks target src/server.ts and src/web/dashboard.html unless noted.
# ---------------------------------------------------------------------------

- id: explicit_build_mode
  title: "Require explicit mode flag for POST /builds"
  tags: [api, backend]
  depends_on: []
  budget:
    max_iterations: 6
    max_cost: 20.0
  variables:
    description: >
      POST /builds currently accepts either `repo` (clone mode) or `dir` (local
      directory mode) and infers the mode from which field is present. This is
      ambiguous — the consumer should explicitly declare intent.

      Change the API contract:

      Required field:
        mode: "clone" | "local"

      When mode is "clone":
        - `repo` (string, required): git URL or path to clone from
        - Clones into {dataDir}/builds/{name}/repo as before
        - Returns 400 if `repo` is missing

      When mode is "local":
        - `dir` (string, required): absolute path to existing project directory
        - Uses directory in-place, no clone
        - Returns 400 if `dir` is missing or doesn't exist

      When mode is missing:
        - Return 400: { error: "Missing required field: mode (\"clone\" or \"local\")" }

      When mode is an unrecognized value:
        - Return 400: { error: "Invalid mode: must be \"clone\" or \"local\"" }

      If both `repo` and `dir` are provided (regardless of mode), return 400
      to prevent confusion.

      The dashboard.html create build form has ALREADY been updated with mode
      radio buttons ("Clone repository" / "Local directory"), toggleModeFields(),
      and the submitBuild() function sends the mode field. Do NOT modify the
      form — only change the server-side handler in src/server.ts.

      Update the help text printed on server startup to reflect the new API.
    develop_focus:
      - "Add mode field validation in POST /builds handler"
      - "Return 400 with clear error when mode is missing or invalid"
      - "Reject requests with both repo and dir set"
      - "Update server startup help text"

- id: conn_indicator_fix
  title: "Fix connection status indicator and reconnect flicker"
  tags: [bugfix, ui]
  depends_on: []
  budget:
    max_iterations: 5
    max_cost: 15.0
  variables:
    description: >
      Two bugs in dashboard.html:

      1. The connection status indicator (.conn) is positioned fixed at top-right
         (top: 8px, right: 8px) and overlaps the "New Build" button in the topbar.
         Move it to a small fixed footer bar at the bottom of the viewport.

      2. The indicator flashes "reconnecting" every few seconds. This happens because
         the SSE EventSource fires onerror on each reconnect cycle even when the
         connection is healthy. The fix: only show "reconnecting" after a sustained
         disconnect (e.g., 3+ seconds without a successful event), not on every
         transient onerror. Track a lastEventTime and use a debounce.

      Both fixes are purely in src/web/dashboard.html CSS and JS.
    develop_focus:
      - "Move .conn to a fixed bottom footer"
      - "Debounce reconnecting state — only show after sustained disconnect"

- id: server_state_enrichment
  title: "Inject task list, workflow, and JSONL events into server state"
  tags: [backend, core]
  depends_on: []
  budget:
    max_iterations: 8
    max_cost: 30.0
  variables:
    description: >
      The monitor (src/display/web.ts) enriches state.json before pushing it
      to clients — it injects _pendingTasks, _totalTasks, _workflow, _recentLog,
      and _intervention. The server (src/server.ts) does none of this. It reads
      state.json raw and pushes it as-is via SSE. This means the dashboard has
      no task list, no workflow info, and no activity log.

      Replicate the enrichment logic from web.ts in server.ts. When the server
      reads a build's state.json (in the file watcher callback and in
      GET /builds/:id), enrich it:

      1. Read the build's orca config (project.orca.yaml in the repo dir).
         Use loadTasks() to get the full ordered task list. Inject:
         - _pendingTasks: string[] (all task IDs in execution order)
         - _totalTasks: number
         - _workflow: WorkflowConfig (pre/loop/post stage names)

      2. Read the JSONL log for the current task's current stage.
         Path: {repoDir}/.orca/tasks/{currentTaskId}/{currentStage}.jsonl
         Parse the last 30 lines. Inject as _recentLog: object[].
         Copy the readRecentLog() function from web.ts.

      3. Read eval_result.json for each task that has one.
         Path: {repoDir}/.orca/tasks/{taskId}/eval_result.json
         Inject as _evalResults: Record<string, EvalResult> keyed by taskId.

      4. Check for intervention.json (already partially done for the SSE
         intervention event — make sure it's also in the state payload).

      Cache the parsed config per build (it doesn't change during a build).
      The JSONL and eval files should be re-read on each state update since
      they change frequently.
    develop_focus:
      - "Parse and cache build config per build (loadTasks, workflow)"
      - "Inject _pendingTasks, _totalTasks, _workflow into state"
      - "Port readRecentLog() from web.ts, inject _recentLog"
      - "Read eval_result.json per task, inject _evalResults"
      - "Ensure intervention.json is included in state payload"

- id: task_list_and_history
  title: "Show all tasks with expandable stage history"
  tags: [ui, core]
  depends_on: [server_state_enrichment]
  budget:
    max_iterations: 10
    max_cost: 40.0
  stages:
    develop:
      max_turns: 200
  variables:
    description: >
      Rework the task list in the dashboard detail view. Currently it only shows
      tasks that have entered state.tasks (i.e., already started). Pending tasks
      are invisible. And for started tasks, only the current iteration/cost is
      shown — no history.

      Changes to the renderDetail() function in dashboard.html:

      1. Use state._pendingTasks (injected by server) to render ALL tasks in
         execution order. Tasks not yet in state.tasks render as pending (dimmed,
         empty circle icon). This is the same pattern monitor.html already uses.

      2. For each task that has history (state.tasks[id].history[]), add an
         expandable section below the task header. Clicking the task card toggles
         it open/closed.

      3. The expanded section shows iteration history grouped by iteration number:
         - Each iteration is a row with: "Iter N" label, stage dots (like the
           monitor's stage-row), total cost for that iteration, summary text
           from the last stage in that iteration.
         - Use the existing stage-dot CSS classes (done/active/pending/failed).
         - The current iteration is always visible (not collapsed).
         - Previous iterations are collapsed by default.

      4. Show the workflow stages (from _workflow) as column headers for the
         stage dots, so users understand the pre → loop → post progression.

      Keep the existing progress bars for the active task. They should appear
      below the history section.
    develop_focus:
      - "Render all tasks from _pendingTasks with pending state for unstarted ones"
      - "Add click-to-expand on task cards"
      - "Render iteration history grouped by iteration number"
      - "Show stage dots per iteration using workflow stage names"
      - "Keep progress bars for active task"

- id: build_summary_stats
  title: "Compute and display aggregate build stats in header"
  tags: [ui]
  depends_on: [server_state_enrichment]
  budget:
    max_iterations: 6
    max_cost: 20.0
  variables:
    description: >
      The build header currently shows: status, total cost, elapsed, tasks X/Y.
      Add computed summary stats derived from state.tasks and history[]. All
      computation is client-side in dashboard.html — no server changes needed.

      Add a second row to the detail-summary div with:

      1. Tasks failed count (only if > 0, red)
      2. Total iterations across all tasks (sum of task.iteration)
      3. Average iterations per completed task (total iters / completed count)
      4. Cost rate: totalCostUsd / elapsed minutes, displayed as "$/min"
      5. Per-stage cost breakdown: aggregate costUsd from all history[] entries
         grouped by stage label. Display as compact pills, e.g.:
         "develop $12.40 | eval $0.80 | understand $2.10"

      These stats update on every render() call since the state is live.
      Use the existing .summary CSS class and .val spans for consistent styling.
      The per-stage breakdown should use smaller text (11px) on its own line.
    develop_focus:
      - "Compute total/average iterations from state.tasks"
      - "Compute cost rate from totalCostUsd and elapsed time"
      - "Aggregate history[] entries by stage label for per-stage costs"
      - "Render stats in the detail header using existing CSS patterns"

- id: eval_results_display
  title: "Show eval test results on task cards"
  tags: [ui]
  depends_on: [server_state_enrichment, task_list_and_history]
  budget:
    max_iterations: 8
    max_cost: 25.0
  variables:
    description: >
      The server now injects _evalResults (Record<taskId, EvalResult>) into the
      state. Display this on each task card in the dashboard.

      EvalResult shape (from src/config/schema.ts):
        { passed: boolean, summary: string, details?: string,
          passed_tests?: string[], failed_tests?: string[],
          total?: number, passed_count?: number, failed_count?: number }

      For each task that has an eval result in state._evalResults[taskId]:

      1. Show a compact test summary next to the task meta:
         - "14/20 passing" (green if all pass, yellow/red otherwise)
         - Or "COMPILE ERROR" in red if no test counts

      2. If there are failed_tests, show them in a collapsed list below the
         task header (same expand/collapse pattern as the history section).
         Each failing test name on its own line, dimmed red text.

      3. On the iteration history rows (from task_list_and_history), show the
         eval result for that iteration if available. The eval stage dot should
         be green (pass) or red (fail) based on the result from that iteration's
         StageRecord — use the summary field which contains the evalSummary()
         output.
    develop_focus:
      - "Read _evalResults from state and display on task cards"
      - "Show pass/fail counts with color coding"
      - "Collapsed list of failing test names"
      - "Color eval stage dots in iteration history based on summary"

- id: structured_activity_log
  title: "Replace raw stdout log with structured JSONL event log"
  tags: [ui, core]
  depends_on: [server_state_enrichment]
  budget:
    max_iterations: 10
    max_cost: 40.0
  stages:
    develop:
      max_turns: 200
  variables:
    description: >
      The output log panel in the dashboard detail view currently shows raw
      stdout/stderr lines from the child process (PrintDisplay output). These
      are unstructured text lines like "[develop] running..." and "[eval] FAIL".

      Replace this with a structured activity log rendered from _recentLog
      (JSONL events injected by the server). This is the same data that
      monitor.html already renders in its activity log panel.

      Rework the log panel in renderDetail():

      1. If state._recentLog exists and has entries, render them instead of
         the raw buildLogs array. Each JSONL entry has:
         - event_type: "invoke_start" | "invoke_end" | "tool_use"
         - timestamp, label, model, num_turns, cost_usd, duration_ms
         - tool_name, tool_input (for tool_use events)

      2. Render events using the same format as monitor.html's renderLog():
         - invoke_start: green, ">> {label} started ({model})"
         - invoke_end: yellow, "|| {label} done -- {turns} turns, ${cost}, {duration}"
         - tool_use: cyan, "* {tool_name} {key_arg}" where key_arg is:
           Read/Write/Edit -> file_path, Bash -> command (truncated),
           Grep -> pattern, Glob -> pattern
         - Timestamp prefix in dim text

      3. Keep the raw stdout log as a fallback tab/toggle: "Activity" | "Raw Output".
         Default to Activity when _recentLog is available.

      4. Auto-scroll to bottom on new entries. Show entry count in header.

      Copy the renderLog function and log-entry CSS from monitor.html -- it
      already handles this exact rendering.
    develop_focus:
      - "Render _recentLog JSONL events with typed formatting"
      - "Port renderLog() and log-entry CSS from monitor.html"
      - "Add Activity / Raw Output toggle"
      - "Fall back to raw stdout when _recentLog is empty"
      - "Auto-scroll and entry count"

- id: budget_health_indicators
  title: "Color-coded progress bars and stuck detection"
  tags: [ui]
  depends_on: [task_list_and_history]
  budget:
    max_iterations: 6
    max_cost: 20.0
  variables:
    description: >
      The iteration and budget progress bars are always blue (var(--bar-fill)).
      Add color thresholds and stuck detection.

      Progress bar colors:
      - Under 60%: green (var(--green) or #3fb950)
      - 60-85%: yellow (var(--yellow) or #d29922)
      - Above 85%: red (var(--red) or #f85149)
      Apply to both the iteration bar and budget bar independently.
      Compute percentage from existing values (iteration/maxIterations,
      costUsd/maxCost) and set the bar fill color via inline style.

      Stuck detection:
      - Read state.tasks[id].history[] and check the outputHash field on
        consecutive entries with the same label (stage name).
      - If the last 2+ entries for a loop stage have identical non-null
        outputHash values, the task is stuck (producing the same output).
      - Show a "stuck" badge on the task card in orange/yellow:
        "stuck -- same output for N iterations"
      - This is the same detection logic as detectStuck() in supervisor.ts,
        replicated client-side for display purposes.

      Both features are pure client-side changes in dashboard.html.
    develop_focus:
      - "Compute progress percentage and apply color thresholds"
      - "Detect stuck from consecutive identical outputHash in history"
      - "Show stuck badge on affected task cards"

- id: build_metadata_display
  title: "Show project metadata on build list and detail views"
  tags: [ui, backend]
  depends_on: [server_state_enrichment]
  budget:
    max_iterations: 8
    max_cost: 25.0
  variables:
    description: >
      The build list and detail views show minimal metadata — just name, status,
      start time, and repo URL. The server already has access to much more via
      BuildInfo and the parsed orca config. Surface it.

      Backend (src/server.ts):
      Add a _buildMeta object to the enriched state payload (alongside
      _pendingTasks, _workflow, etc.). Populate it from BuildInfo and the
      cached parsed config:

        _buildMeta: {
          repoUrl: string,           // already in BuildInfo
          repoPath: string,          // already in BuildInfo
          specPath: string | null,   // already in BuildInfo
          mode: "clone" | "local",   // infer from whether repoUrl == repoPath
          projectDir: string,        // from config.project_dir
          model: string,             // from config.model
          nixMode: string | null,    // "flake" | "packages" | "shell.nix" | "none"
                                     // derive from the NixConfig + what buildNixCommand resolved
          taskCount: number,         // from _totalTasks (already computed)
          workflow: string,          // short summary like "develop -> deploy -> qa"
          gitEnabled: boolean,       // from config.git?.enabled
          budgetGlobal: { max_iterations: number, max_cost: number } | null
        }

      Also include _buildMeta in the GET /builds list endpoint (not just detail),
      so the build cards on the overview page can show key info.

      Frontend (src/web/dashboard.html):

      On the build list (overview) cards:
      - Show project path below the name (dimmed, smaller text)
      - Show model name as a small badge (e.g., "opus")
      - Show nix mode if not "none" (e.g., "nix: flake")

      On the detail header:
      - Replace the single "Repo" line with a metadata section:
        Project: /home/user/myproject
        Spec: self-build/project.orca.yaml
        Mode: local (or clone from https://...)
        Model: opus
        Nix: flake (or packages, shell.nix, none)
        Workflow: develop -> deploy -> qa
        Git: enabled, snapshot before develop
        Budget: 10 iterations, $50.00 max
      - Use the existing dim text styling, keep it compact (two-column grid or
        inline key-value pairs).
    develop_focus:
      - "Build _buildMeta object in server state enrichment"
      - "Derive nixMode from NixConfig and buildNixCommand resolution"
      - "Include _buildMeta in GET /builds list responses"
      - "Render metadata on build list cards (path, model, nix)"
      - "Render full metadata section in detail header"
