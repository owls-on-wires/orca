name: link-board
project_dir: .
model: sonnet
scope:
  writable: ["**"]
  readable: ["**"]

# ─────────────────────────────────────────────────────────
# Link Board — Dynamic Tasking with Sprint QA
# ─────────────────────────────────────────────────────────
#
# Starts with a single planner action. The planner reads
# EPICS.md, decomposes each epic into tasks via POST /groups,
# adds a sprint QA after the epic, and chains the next planner.
#
# Flow per epic:
#   planner-N → [task groups] → sprint-qa-N → planner-N+1
#
# Templates define the task patterns. The planner picks
# tdd, tdd-qa, or dev for each task based on its nature.
#
# A supervisor action catches unhandled failures.
# A git-commit step runs after each eval pass.
# ─────────────────────────────────────────────────────────

templates:

  # Full TDD: write tests first, then implement, then verify, then commit.
  tdd:
    actions: [write-tests, develop, eval, commit]
    types:
      write-tests:
        type: agent
        max_turns: 40
        toolset: all
      develop:
        type: agent
        max_turns: 80
        toolset: all
      eval:
        type: command
        timeout: 30
        edges:
          fail: develop
          stuck: develop
          error: develop
          timeout: develop
          cost_exceeded: develop
          max_turns: develop
      commit:
        type: command
        params:
          command: "git add -A && git commit -m \"feat: ${TASK_ID:-update}\" --allow-empty"
          timeout: 10

  # TDD + live QA after commit.
  tdd-qa:
    actions: [write-tests, develop, eval, commit, qa]
    types:
      write-tests:
        type: agent
        max_turns: 40
        toolset: all
      develop:
        type: agent
        max_turns: 80
        toolset: all
      eval:
        type: command
        timeout: 30
        edges:
          fail: develop
          stuck: develop
          error: develop
          timeout: develop
          cost_exceeded: develop
          max_turns: develop
      commit:
        type: command
        params:
          command: "git add -A && git commit -m \"feat: ${TASK_ID:-update}\" --allow-empty"
          timeout: 10
      qa:
        type: agent
        max_turns: 30
        toolset: all
        edges:
          fail: develop
          stuck: develop
          error: develop
          timeout: develop
          cost_exceeded: develop
          max_turns: develop

  # Simple develop + verify + commit. No test-writing.
  dev:
    actions: [develop, eval, commit]
    types:
      develop:
        type: agent
        max_turns: 40
        toolset: all
      eval:
        type: command
        timeout: 30
        edges:
          fail: develop
          stuck: develop
          error: develop
          timeout: develop
          cost_exceeded: develop
          max_turns: develop
      commit:
        type: command
        params:
          command: "git add -A && git commit -m \"chore: ${TASK_ID:-update}\" --allow-empty"
          timeout: 10

  # Planner: single agent action. Prompt lives here.
  planner:
    actions: [plan]
    types:
      plan:
        type: agent
        max_turns: 40
        toolset: all
        params:
          prompt: >
            You are a build planner for "link-board" — a link-sharing
            platform built with Bun and SQLite.

            ## Setup

            The orca API is at http://localhost:7072.
            Read http://localhost:7072/llms.txt for the full API reference.
            Read EPICS.md for the list of epics to build.
            Read the src/ directory to understand existing code.

            ## Your job

            1. Check the graph: curl -s http://localhost:7072/actions | jq '[.[] | {id, status}]'
            2. Identify the FIRST uncompleted epic in EPICS.md.
               (If actions for an epic exist and are completed, it's done.)
            3. If the previous action's output indicates QA failures, add
               fix tasks before starting new feature work.
            4. Decompose the epic into 2-4 tasks. For each, pick a template:
               - tdd: data layer, models, utilities
               - tdd-qa: HTTP endpoints, user-facing API
               - dev: config changes, package.json, simple refactors
            5. Create the FIRST task with "after" set to YOUR OWN action ID
               (so it starts when you complete). Find your action ID from the
               graph state (it's the action with status "running").
               For subsequent tasks, set "after" to the previous task's
               last action (commit for tdd/dev, qa for tdd-qa).
               curl -X POST http://localhost:7072/groups -H 'Content-Type: application/json' \
                 -d '{"id":"task-name","template":"tdd","project_id":"link-board",
                      "prompt":"Implement...","after":"plan-epic-N.plan",
                      "overrides":{"write-tests":{"prompt":"Write tests for..."},
                                   "eval":{"command":"bun test test/task.test.ts"}}}'
            6. After the last task, create a notify + sprint QA + next planner:
               a) Notify (after last task's terminal action):
               curl -X POST http://localhost:7072/groups -H 'Content-Type: application/json' \
                 -d '{"id":"notify-N","template":"notify","project_id":"link-board",
                      "after":"last-task.commit"}'
               (For tdd-qa tasks, use "after":"last-task.qa" instead)
               b) Sprint QA (after notify):
               curl -X POST http://localhost:7072/groups -H 'Content-Type: application/json' \
                 -d '{"id":"sprint-qa-N","template":"sprint-qa","project_id":"link-board",
                      "after":"notify-N.send"}'
               c) Next planner:
               curl -X POST http://localhost:7072/groups -H 'Content-Type: application/json' \
                 -d '{"id":"plan-epic-N+1","template":"planner","project_id":"link-board"}'
            7. Wire sprint-qa to next planner (both pass and fail,
               so planner always runs and can plan fixes if QA failed):
               curl -X POST http://localhost:7072/edges -H 'Content-Type: application/json' \
                 -d '{"from_action":"sprint-qa-N.qa","to_action":"plan-epic-N+1.plan","condition":"pass"}'
               curl -X POST http://localhost:7072/edges -H 'Content-Type: application/json' \
                 -d '{"from_action":"sprint-qa-N.qa","to_action":"plan-epic-N+1.plan","condition":"fail"}'
            8. If ALL 5 epics are complete and QA has passed, report
                status: passed. Do NOT create more tasks.

            ## Prompt guidelines

            IMPORTANT: Each task's prompts must be SCOPED to only the
            work for that specific task. Do NOT tell agents to read
            EPICS.md or implement features beyond their task. The agent
            should only know about the specific functions/endpoints it
            needs to build, not the full project roadmap. Future epics
            will be handled by future planners.

            write-tests: specify test file path, exact test cases, imports,
            use beforeEach(() => resetDb()) for DB tests. Server tests
            import "../src/server" (port 3458). Only list tests for THIS
            task's functionality.

            develop: specify files to create/modify, functions/endpoints,
            tell agent to read src/ first for conventions. Only implement
            what the tests for THIS task require — nothing more.

            qa (tdd-qa template): tell agent to kill port 3458, start server,
            test with curl, kill when done. List specific requests and
            expected responses.

            eval: set command to "bun test test/{task}.test.ts" or "bun test".

            ## Conventions

            - Bun with bun:test, bun:sqlite. Server on port 3458.
            - Auth: Bun.password.hash/verify, simple HMAC-SHA256 JWT.
            - Action IDs: {task-name}.{stage}
            - Always verify API calls succeed (check response).
            - Each task group includes a commit step after eval.
            - For sequential tasks within an epic, wire "after" to
              the previous task's last action (commit or qa).

  # Notify: fire-and-forget ntfy push. Placed between last task and sprint QA.
  notify:
    actions: [send]
    types:
      send:
        type: command
        params:
          command: "curl -sf -d \"Sprint tasks complete for link-board\" ntfy.sh/orca-builds || true"
          timeout: 10
        edges:
          fail: complete
          error: complete
          stuck: complete
          timeout: complete
          cost_exceeded: complete
          max_turns: complete

  # Sprint QA: integration test for the current sprint's work.
  sprint-qa:
    actions: [qa]
    types:
      qa:
        type: agent
        max_turns: 30
        toolset: all
        params:
          prompt: >
            You are a QA engineer for the link-board project.

            Your job is to verify that the EXISTING, IMPLEMENTED
            functionality works correctly. Do NOT test endpoints or
            features that haven't been built yet.

            ## How to determine what to test

            1. Check the orca graph to see which task groups completed:
               curl -s http://localhost:7072/actions | jq '[.[] | select(.status == "completed") | .id]'
            2. Read the test files in test/ to understand what was built.
            3. Read src/server.ts to see which routes actually exist.
            4. Only test routes that are implemented in the code.
               Do NOT read EPICS.md — it lists future work too.

            ## How to test

            1. Kill any process on port 3458:
               kill $(lsof -ti:3458 -sTCP:LISTEN) 2>/dev/null
            2. Start server: bun run src/server.ts &
            3. Wait 2 seconds, verify GET http://localhost:3458/health

            Test ONLY the endpoints you found in src/server.ts.
            Use curl to make real HTTP requests. Verify:
            - Correct status codes (200, 201, 400, 401, 404, 409)
            - Response shapes (check key fields with jq)
            - Auth enforcement (protected routes reject no-auth)
            - Error handling (invalid input, missing resources)

            If an endpoint returns 500, that means it's a stub and
            NOT implemented yet — skip it, don't report it as a failure.

            Kill the server when done.

            Report status: "passed" if all IMPLEMENTED endpoints work.
            Report status: "failed" only if an endpoint that IS
            implemented returns wrong results or unexpected errors.

  # Supervisor: catches unhandled failures.
  supervisor:
    actions: [diagnose]
    types:
      diagnose:
        type: agent
        max_turns: 40
        toolset: all
        tags: ["type:supervisor"]
        params:
          prompt: >
            An action has failed with no recovery edge.

            The orca API is at http://localhost:7072.
            Read http://localhost:7072/llms.txt for the API reference.

            Check params.failed_action and params.failed_condition
            for context about what failed.

            Steps:
            1. Read the failed action's detail and logs:
               curl -s http://localhost:7072/actions/{failed_action} | jq .
               curl -s http://localhost:7072/actions/{failed_action}/logs | jq .
            2. Read the source code the action was working on.
            3. Diagnose why it failed.
            4. Fix the issue — update code, fix tests, etc.
            5. Retry the action:
               curl -X POST http://localhost:7072/actions/{failed_action}/retry

            Report status: "passed" after fixing and retrying.

tasks:
  - id: plan-epic-1
    template: planner

  - id: supervisor
    template: supervisor
