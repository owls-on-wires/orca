name: link-board
project_dir: .
model: sonnet
scope:
  writable: ["**"]
  readable: ["**"]

# ─────────────────────────────────────────────────────────
# Link Board — Dynamic Tasking
# ─────────────────────────────────────────────────────────
#
# Starts with a single planner action. The planner reads
# EPICS.md, decomposes each epic into tasks, picks a
# template pattern for each, and creates actions + edges
# via the orca HTTP API.
#
# Flow:
#   plan-epic-1 → [epic tasks] → plan-epic-2 → ...
# ─────────────────────────────────────────────────────────

# ── Templates ──
# These define the action patterns the planner creates.
# The planner reads these to know what actions, types,
# edges, and prompts to produce for each task.

templates:

  # Full TDD: write tests first, then implement, then verify.
  # Use for: data layer, models, utilities, internal modules.
  tdd:
    actions: [write-tests, develop, eval]
    types:
      write-tests:
        type: agent
        max_turns: 40
        toolset: all
        # Prompt: tell the agent what test file to create and
        # what test cases to write. Be specific.
      develop:
        type: agent
        max_turns: 80
        toolset: all
        # Prompt: tell the agent what to implement to pass the
        # tests. Reference existing code and conventions.
      eval:
        type: command
        timeout: 30
        # params.command: "bun test test/{task}.test.ts"
        edges:
          fail: develop
          stuck: develop
          error: develop
          timeout: develop
          cost_exceeded: develop
          max_turns: develop

  # TDD + live QA: same as tdd, plus an agent that starts the
  # server and tests endpoints with curl.
  # Use for: HTTP endpoints, API routes, anything user-facing.
  tdd-qa:
    actions: [write-tests, develop, eval, qa]
    types:
      write-tests:
        type: agent
        max_turns: 40
        toolset: all
      develop:
        type: agent
        max_turns: 80
        toolset: all
      eval:
        type: command
        timeout: 30
        edges:
          fail: develop
          stuck: develop
          error: develop
          timeout: develop
          cost_exceeded: develop
          max_turns: develop
      qa:
        type: agent
        max_turns: 30
        toolset: all
        # Prompt: kill port 3458, start server, test with curl,
        # kill server. Return passed/failed.
        edges:
          fail: develop
          stuck: develop
          error: develop
          timeout: develop
          cost_exceeded: develop
          max_turns: develop

  # Simple develop + verify. No test-writing stage.
  # Use for: config changes, package.json, simple refactors,
  # non-functional changes.
  dev:
    actions: [develop, eval]
    types:
      develop:
        type: agent
        max_turns: 40
        toolset: all
      eval:
        type: command
        timeout: 30
        edges:
          fail: develop
          stuck: develop
          error: develop
          timeout: develop
          cost_exceeded: develop
          max_turns: develop

  # Planner: single agent action.
  planner:
    actions: [plan]
    types:
      plan:
        type: agent
        max_turns: 40
        toolset: all

# ── Tasks ──

tasks:
  - id: plan-epic-1
    template: planner
    prompt: >
      You are a build planner for "link-board" — a link-sharing platform
      (like Hacker News) built with Bun and SQLite.

      ## Your files

      - EPICS.md — The 5 epics to build, in order.
      - ORCA-API.yaml — The orca API schema. API is at http://localhost:7072.
      - project.orca.yaml — Read the templates section to understand the
        3 task patterns available: tdd, tdd-qa, dev.

      ## Step by step

      1. Read EPICS.md.
      2. Read the templates in project.orca.yaml to understand the patterns.
      3. Check the current graph:
         curl -s http://localhost:7072/actions | jq '[.[] | {id, status}]'
      4. Read the src/ directory to see what code exists already.
      5. Identify the FIRST uncompleted epic.
      6. Decompose it into 2-4 tasks. For each task, pick a template:
         - tdd: data layer, models, utilities (write-tests → develop → eval)
         - tdd-qa: HTTP endpoints, API routes (write-tests → develop → eval → qa)
         - dev: config, package.json, simple changes (develop → eval)
      7. Create actions and edges via the API (see below).
      8. Activate the first task.
      9. Create plan-epic-{N+1} and wire it after the last task.
      10. If all epics are done, report status: passed.

      ## Creating a "tdd" task

      For a task called "auth-models" using the tdd pattern:

      curl -s -X POST http://localhost:7072/actions -H 'Content-Type: application/json' \
        -d '{"id":"auth-models.write-tests","type":"agent","status":"inactive",
             "params":{"prompt":"Write test/auth-models.test.ts. Test: ...","max_turns":40,"toolset":"all"},
             "tags":["task:auth-models","project:link-board","type:write-tests"]}'

      curl -s -X POST http://localhost:7072/actions -H 'Content-Type: application/json' \
        -d '{"id":"auth-models.develop","type":"agent","status":"inactive",
             "params":{"prompt":"Implement src/auth.ts. Functions: ...","max_turns":80,"toolset":"all"},
             "tags":["task:auth-models","project:link-board","type:develop"]}'

      curl -s -X POST http://localhost:7072/actions -H 'Content-Type: application/json' \
        -d '{"id":"auth-models.eval","type":"command","status":"inactive",
             "params":{"command":"bun test test/auth-models.test.ts","timeout":30},
             "tags":["task:auth-models","project:link-board","type:eval"]}'

      curl -s -X POST http://localhost:7072/edges -H 'Content-Type: application/json' \
        -d '{"from_action":"auth-models.write-tests","to_action":"auth-models.develop","condition":"pass"}'
      curl -s -X POST http://localhost:7072/edges -H 'Content-Type: application/json' \
        -d '{"from_action":"auth-models.develop","to_action":"auth-models.eval","condition":"pass"}'
      curl -s -X POST http://localhost:7072/edges -H 'Content-Type: application/json' \
        -d '{"from_action":"auth-models.eval","to_action":"auth-models.develop","condition":"fail"}'

      ## Creating a "tdd-qa" task

      Same as tdd, plus a qa action after eval:

      curl -s -X POST http://localhost:7072/actions -H 'Content-Type: application/json' \
        -d '{"id":"auth-endpoints.qa","type":"agent","status":"inactive",
             "params":{"prompt":"QA: kill port 3458, start server (bun run src/server.ts &), wait 2s, test with curl: ... Kill server when done. Return passed/failed.","max_turns":30,"toolset":"all"},
             "tags":["task:auth-endpoints","project:link-board","type:qa"]}'

      curl -s -X POST http://localhost:7072/edges -H 'Content-Type: application/json' \
        -d '{"from_action":"auth-endpoints.eval","to_action":"auth-endpoints.qa","condition":"pass"}'
      curl -s -X POST http://localhost:7072/edges -H 'Content-Type: application/json' \
        -d '{"from_action":"auth-endpoints.qa","to_action":"auth-endpoints.develop","condition":"fail"}'

      ## Creating a "dev" task

      Just develop + eval, no write-tests:

      curl -s -X POST http://localhost:7072/actions -H 'Content-Type: application/json' \
        -d '{"id":"setup-deps.develop","type":"agent","status":"inactive",
             "params":{"prompt":"Add bcrypt to package.json and run bun install","max_turns":40,"toolset":"all"},
             "tags":["task:setup-deps","project:link-board","type:develop"]}'
      curl -s -X POST http://localhost:7072/actions -H 'Content-Type: application/json' \
        -d '{"id":"setup-deps.eval","type":"command","status":"inactive",
             "params":{"command":"bun test","timeout":30},
             "tags":["task:setup-deps","project:link-board","type:eval"]}'

      curl -s -X POST http://localhost:7072/edges -H 'Content-Type: application/json' \
        -d '{"from_action":"setup-deps.develop","to_action":"setup-deps.eval","condition":"pass"}'
      curl -s -X POST http://localhost:7072/edges -H 'Content-Type: application/json' \
        -d '{"from_action":"setup-deps.eval","to_action":"setup-deps.develop","condition":"fail"}'

      ## Wiring dependencies between tasks

      If task B depends on task A completing:

      curl -s -X POST http://localhost:7072/edges -H 'Content-Type: application/json' \
        -d '{"from_action":"auth-models.eval","to_action":"auth-endpoints.write-tests","condition":"pass"}'

      (Use the LAST action of the predecessor — .eval for tdd/dev, .qa for tdd-qa)

      ## Activating the first task

      curl -s -X PATCH http://localhost:7072/actions/auth-models.write-tests \
        -H 'Content-Type: application/json' -d '{"status":"pending"}'

      ## Creating the next planner

      curl -s -X POST http://localhost:7072/actions -H 'Content-Type: application/json' \
        -d '{"id":"plan-epic-{N+1}","type":"agent","status":"inactive",
             "params":{"prompt":"<this entire prompt>"},
             "tags":["type:planner","project:link-board"]}'

      curl -s -X POST http://localhost:7072/edges -H 'Content-Type: application/json' \
        -d '{"from_action":"{last-task-terminal}","to_action":"plan-epic-{N+1}","condition":"pass"}'

      ## Prompt-writing guidelines

      write-tests prompts should specify:
      - Exact test file path (test/{task}.test.ts)
      - List of specific test cases to write
      - What imports to use (bun:test, source modules)
      - Use beforeEach(() => resetDb()) for DB tests
      - Server endpoint tests: import "../src/server" to start on port 3458

      develop prompts should specify:
      - What file(s) to create or modify in src/
      - Exact functions, types, or endpoints to implement
      - Tell the agent to read existing src/ code first for conventions
      - Reference what the tests expect

      qa prompts should specify:
      - Kill any process on port 3458: kill $(lsof -ti:3458 -sTCP:LISTEN) 2>/dev/null
      - Start server: bun run src/server.ts &
      - Wait 2 seconds, verify GET http://localhost:3458/health
      - List specific curl requests to make and what to verify
      - Kill server when done
      - Return status: passed or failed with notes

      ## Conventions

      - Bun with bun:test for testing, bun:sqlite for database
      - Server on port 3458
      - For auth: Bun.password.hash/verify, simple HMAC-SHA256 JWT (no libraries)
      - Action IDs: {task-name}.{stage} — e.g., auth-models.write-tests
      - Always verify API calls succeed (check response for errors)

    budget:
      max_iterations: 3
