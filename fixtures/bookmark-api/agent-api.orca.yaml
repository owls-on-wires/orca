name: bookmark-api
project_dir: .
model: sonnet
scope:
  writable: ["src/**", "test/**"]
  readable: ["**"]
git:
  snapshot: true

# ─────────────────────────────────────────────────────────
# Bookmark Manager API — 17 features, TDD pipeline
# ─────────────────────────────────────────────────────────
#
# Each feature runs: write-tests → develop → eval [→ qa]
#   - write-tests: agent writes the test file (red phase)
#   - develop: agent writes code to pass the tests (green phase)
#   - eval: bun test verifies (automated gate)
#   - qa: agent starts server, tests live endpoints (integration)
#
# Dependency graph (by feature):
#
#                  start-services
#                       |
#                  setup-schema
#                   /            \
#         impl-bookmarks      impl-tags
#                   \            /
#                  api-bookmarks
#                       |
#                    api-tags
#                 /     |     \
#    add-favorites add-search add-sorting
#                 \     |     /
#               add-pagination
#              /       |       \
# add-collections  add-archive  add-url-validation
#              \       |       /
#            add-bulk-ops  add-click-tracking
#                      \  /
#                   add-stats
#                       |
#                   add-notes
# ─────────────────────────────────────────────────────────

templates:
  setup:
    actions: [install, start, verify]
    types:
      install:
        type: command
        params:
          command: "bun install"
          timeout: 30
      start:
        type: command
        params:
          command: "kill $(lsof -ti:3457 -sTCP:LISTEN) 2>/dev/null; nohup bun run src/server.ts > /tmp/bookmark-api.log 2>&1 & sleep 1; echo started"
          timeout: 10
      verify:
        type: command
        params:
          command: "curl -sf http://localhost:3457/health"
          timeout: 10
        edges:
          fail: start
          error: start

  tdd:
    actions: [write-tests, develop, eval]
    types:
      write-tests:
        type: agent-api
        max_turns: 40
        toolset: all
      develop:
        type: agent-api
        max_turns: 80
        toolset: all
      eval:
        type: command
        command: "bun test"
        timeout: 30
        edges: { fail: develop, stuck: develop, error: develop, timeout: develop, cost_exceeded: develop, max_turns: develop }

  tdd-qa:
    actions: [write-tests, develop, eval, qa]
    types:
      write-tests:
        type: agent-api
        max_turns: 40
        toolset: all
      develop:
        type: agent-api
        max_turns: 80
        toolset: all
      eval:
        type: command
        command: "bun test"
        timeout: 30
        edges: { fail: develop, stuck: develop, error: develop, timeout: develop, cost_exceeded: develop, max_turns: develop }
      qa:
        type: agent-api
        max_turns: 30
        toolset: all
        edges: { fail: develop, stuck: develop, error: develop, timeout: develop, cost_exceeded: develop, max_turns: develop }

tasks:

  # ── Phase 0: Environment ──

  - id: start-services
    template: setup
    budget:
      max_iterations: 3

  # ── Phase 1: Foundation ──

  - id: setup-schema
    template: tdd
    prompt: >
      Read SPEC.md for the full project specification.

      Create src/db.ts — SQLite database using bun:sqlite. Create an in-memory
      database. Create the three tables (bookmarks, tags, bookmark_tags) with
      all columns and constraints from SPEC.md. Enable PRAGMA foreign_keys = ON.
      Export getDb(), resetDb() (drops and recreates tables), and db as default
      export. Make all tests in test/schema.test.ts pass.
    depends_on: [start-services]
    overrides:
      write-tests:
        prompt: >
          Read SPEC.md for the full project specification.

          Create test/schema.test.ts that verifies the database schema.
          Import getDb and resetDb from "../src/db". Use beforeEach(() => resetDb()).
          Write tests that check:
          - bookmarks table exists
          - bookmarks has all 7 columns (id, url, title, description, is_favorite, created_at, updated_at)
          - tags table exists with id and name columns
          - bookmark_tags junction table exists
          - bookmark_tags has composite primary key on (bookmark_id, tag_id)
          - resetDb() clears all data
      eval:
        command: "bun test test/schema.test.ts"
    budget:
      max_iterations: 5

  # ── Phase 2: Data layer (parallel) ──

  - id: impl-bookmarks
    template: tdd
    prompt: >
      Read SPEC.md. Create src/bookmarks.ts implementing bookmark CRUD
      functions. Export Bookmark interface and ListResult type. Use SQLite
      from src/db.ts.

      Functions to implement:
      - createBookmark({ url, title?, description? }) → Bookmark.
        Reject empty/whitespace URL (throw Error). Default title to URL
        hostname if omitted. Set timestamps to new Date().toISOString().
        Convert is_favorite from INTEGER 0/1 to boolean.
      - getBookmark(id) → Bookmark | null. Convert is_favorite to boolean.
      - listBookmarks() → ListResult. Return { bookmarks, total }.
        Ignore optional filter params for now.
      - updateBookmark(id, { title?, description?, url? }) → Bookmark | null.
        Update only provided fields. Set updated_at.
      - deleteBookmark(id) → boolean.

      Make all tests in test/bookmarks.test.ts pass.
    depends_on: [setup-schema]
    overrides:
      write-tests:
        prompt: >
          Read SPEC.md. Create test/bookmarks.test.ts with tests for bookmark
          CRUD. Import resetDb from "../src/db" and functions from
          "../src/bookmarks". Use beforeEach(() => resetDb()). Write tests for:
          - createBookmark returns bookmark with id, url, title, timestamps
          - createBookmark with description
          - createBookmark rejects empty url (throws)
          - createBookmark defaults title to URL hostname when omitted
          - getBookmark returns bookmark by id
          - getBookmark returns null for missing id
          - listBookmarks returns all bookmarks with total count
          - listBookmarks returns empty when none exist
          - updateBookmark changes title
          - updateBookmark changes description
          - updateBookmark returns null for missing id
          - deleteBookmark removes and returns true
          - deleteBookmark returns false for missing id
      eval:
        command: "bun test test/bookmarks.test.ts"
    budget:
      max_iterations: 5

  - id: impl-tags
    template: tdd
    prompt: >
      Read SPEC.md. Create src/tags.ts implementing tag management functions
      using src/db.ts.

      Functions to implement:
      - addTag(bookmarkId, tagName) → void. Find or create tag (INSERT OR IGNORE).
        Insert into bookmark_tags (INSERT OR IGNORE). Idempotent.
      - removeTag(bookmarkId, tagName) → boolean. Return true if removed.
      - getBookmarkTags(bookmarkId) → string[]. JOIN bookmark_tags + tags.
      - listTags() → { name, count }[]. SELECT with COUNT via JOIN.

      Make all tests in test/tags.test.ts pass.
    depends_on: [setup-schema]
    overrides:
      write-tests:
        prompt: >
          Read SPEC.md. Create test/tags.test.ts with tests for tag operations.
          Import resetDb from "../src/db", createBookmark from "../src/bookmarks",
          and tag functions from "../src/tags". Use beforeEach(() => resetDb()).
          Write tests for:
          - addTag associates a tag with a bookmark
          - addTag creates tag if it doesn't exist
          - addTag is idempotent (duplicate ignored)
          - Multiple tags on one bookmark
          - removeTag removes association, returns true
          - removeTag returns false for nonexistent association
          - getBookmarkTags returns empty for untagged bookmark
          - listTags returns tags with correct counts
          - Deleting a bookmark cascades to remove tag associations
      eval:
        command: "bun test test/tags.test.ts"
    budget:
      max_iterations: 5

  # ── Phase 3: Core API ──

  - id: api-bookmarks
    template: tdd-qa
    prompt: >
      Read SPEC.md. Update src/server.ts to add bookmark REST endpoints
      (keep existing /health endpoint):
      - POST /bookmarks → 201 with bookmark, 400 on validation error
      - GET /bookmarks → 200 with { bookmarks, total }
      - GET /bookmarks/:id → 200 or 404
      - PATCH /bookmarks/:id → 200 or 404
      - DELETE /bookmarks/:id → 200 with {deleted: true} or 404

      Parse :id from URL path. Try/catch body parsing, return 400 for bad JSON.
      Make all tests in test/api-bookmarks.test.ts pass.
    depends_on: [impl-bookmarks, impl-tags]
    overrides:
      write-tests:
        prompt: >
          Read SPEC.md. Create test/api-bookmarks.test.ts with HTTP tests.
          Import "../src/server" to start the server. Import resetDb from
          "../src/db". Use beforeEach(() => resetDb()). Use fetch() against
          http://localhost:3457. Write tests for:
          - GET /health returns ok
          - POST /bookmarks creates bookmark (status 201)
          - POST /bookmarks rejects empty url (status 400)
          - GET /bookmarks returns all bookmarks
          - GET /bookmarks/:id returns bookmark (200)
          - GET /bookmarks/:id returns 404 for missing
          - PATCH /bookmarks/:id updates bookmark (200)
          - PATCH /bookmarks/:id returns 404 for missing
          - DELETE /bookmarks/:id removes bookmark (200, then GET returns 404)
          - DELETE /bookmarks/:id returns 404 for missing
      qa:
        prompt: >
          You are a QA engineer testing the bookmark API. Start a fresh server:
          1. Start server: bun run start:bg
          2. Verify GET http://localhost:3457/health returns ok

          Then test these scenarios with curl:
          - Create a bookmark with POST /bookmarks, verify 201 and response shape
          - Create another bookmark, GET /bookmarks, verify list contains both
          - GET /bookmarks/:id for a valid and invalid id (expect 200 and 404)
          - PATCH /bookmarks/:id to update title, verify the change persists
          - DELETE /bookmarks/:id, verify it's gone with a follow-up GET
          - POST /bookmarks with empty url, verify 400
          - POST /bookmarks with missing Content-Type header
          - Send malformed JSON body, verify 400

          Run bun run stop when done. Return status: "passed" if all checks pass,
          "failed" with notes describing what broke.
      eval:
        command: "bun test test/api-bookmarks.test.ts"
    budget:
      max_iterations: 5

  - id: api-tags
    template: tdd-qa
    prompt: >
      Read SPEC.md. Add tag endpoints to src/server.ts (keep existing
      bookmark endpoints intact):
      - POST /bookmarks/:id/tags — body {tag}, return 200 or 404
      - DELETE /bookmarks/:id/tags/:tag — return 200 {deleted: true}
      - GET /bookmarks/:id/tags — return string[]
      - GET /tags — return {name, count}[]
      - GET /bookmarks?tag=X — filter bookmarks by tag

      Also update listBookmarks in src/bookmarks.ts to support tag filtering:
      JOIN with bookmark_tags and tags when opts.tag is provided.
      Make all tests in test/api-tags.test.ts pass.
    depends_on: [api-bookmarks]
    overrides:
      write-tests:
        prompt: >
          Read SPEC.md. Create test/api-tags.test.ts with HTTP tests.
          Import "../src/server" and resetDb. Use beforeEach(() => resetDb()).
          Write a helper to create bookmarks via POST. Write tests for:
          - POST /bookmarks/:id/tags adds a tag (200)
          - POST /bookmarks/:id/tags returns 404 for missing bookmark
          - DELETE /bookmarks/:id/tags/:tag removes a tag
          - GET /bookmarks/:id/tags returns tag list
          - GET /tags returns all tags with counts
          - GET /bookmarks?tag=x filters by tag
      qa:
        prompt: >
          You are a QA engineer testing the tag system. Start a fresh server:
          1. Start server: bun run start:bg
          2. Verify GET http://localhost:3457/health returns ok

          Test with curl:
          - Create 3 bookmarks. Add tags: "javascript" to first two, "python" to third.
          - GET /bookmarks/:id/tags — verify correct tags returned
          - GET /tags — verify counts (javascript: 2, python: 1)
          - GET /bookmarks?tag=javascript — verify only tagged bookmarks returned
          - Add same tag twice to same bookmark — verify idempotent (no duplicates)
          - DELETE /bookmarks/:id/tags/:tag — verify tag removed
          - Add tag to nonexistent bookmark — verify 404
          - Delete a bookmark, verify its tags are cleaned up in GET /tags

          Run bun run stop when done. Return status: "passed" or "failed" with notes.
      eval:
        command: "bun test test/api-tags.test.ts"
    budget:
      max_iterations: 5

  # ── Phase 4: Core features (parallel) ──

  - id: add-favorites
    template: tdd
    prompt: >
      Read SPEC.md. Implement favorites:
      1. Add toggleFavorite(id) → Bookmark | null to src/bookmarks.ts.
         Toggle is_favorite between 0/1. Return updated bookmark or null.
      2. Update listBookmarks to support favorites_only filter.
      3. Add endpoints to src/server.ts:
         POST /bookmarks/:id/favorite → 200 or 404.
         GET /bookmarks?favorites=true → filtered results.
      Make all tests in test/favorites.test.ts pass.
    depends_on: [api-tags]
    overrides:
      write-tests:
        prompt: >
          Read SPEC.md. Create test/favorites.test.ts. Import resetDb,
          createBookmark, toggleFavorite, listBookmarks, and "../src/server".
          Use beforeEach(() => resetDb()). Write tests for:
          - toggleFavorite sets is_favorite to true
          - toggleFavorite toggles back to false
          - toggleFavorite returns null for missing id
          - listBookmarks with favorites_only filter works
          - POST /bookmarks/:id/favorite endpoint toggles favorite
          - GET /bookmarks?favorites=true returns only favorites
      eval:
        command: "bun test test/favorites.test.ts"
    budget:
      max_iterations: 5

  - id: add-search
    template: tdd
    prompt: >
      Read SPEC.md. Implement search:
      1. Update listBookmarks in src/bookmarks.ts: when opts.search is set,
         match title, description, OR url using LIKE with % wildcards.
         Case-insensitive via LOWER(). AND-combine with other filters.
      2. Update GET /bookmarks in src/server.ts to read ?q= param.
      Make all tests in test/search.test.ts pass.
    depends_on: [api-tags]
    overrides:
      write-tests:
        prompt: >
          Read SPEC.md. Create test/search.test.ts. Import resetDb,
          createBookmark, listBookmarks, and "../src/server".
          Use beforeEach(() => resetDb()). Write tests for:
          - listBookmarks search matches title (case-insensitive)
          - Search matches description
          - Search matches url
          - No matches returns empty result
          - GET /bookmarks?q=term endpoint works
          - Combined filters (search + tag, search + favorites)
      eval:
        command: "bun test test/search.test.ts"
    budget:
      max_iterations: 5

  - id: add-sorting
    template: tdd
    prompt: >
      Read SPEC.md. Implement sorting:
      1. Update listBookmarks in src/bookmarks.ts to accept sort_by
         ("created_at" | "title" | "url" | "updated_at", default "created_at")
         and sort_order ("asc" | "desc", default "desc"). Validate sort_by
         against a whitelist to prevent SQL injection. Add ORDER BY clause.
      2. Update GET /bookmarks in src/server.ts to read ?sort= and ?order=.
      Make all tests in test/sorting.test.ts pass.
    depends_on: [api-tags]
    overrides:
      write-tests:
        prompt: >
          Read SPEC.md. Create test/sorting.test.ts. Import resetDb,
          createBookmark, listBookmarks, and "../src/server".
          Use beforeEach(() => resetDb()). Create bookmarks with different
          titles and slight timestamp gaps. Write tests for:
          - Default sort is by created_at descending (newest first)
          - Sort by title ascending
          - Sort by url
          - Invalid sort_by falls back to default (doesn't crash)
          - GET /bookmarks?sort=title&order=asc endpoint works
      eval:
        command: "bun test test/sorting.test.ts"
    budget:
      max_iterations: 5

  # ── Phase 5: Pagination ──

  - id: add-pagination
    template: tdd-qa
    prompt: >
      Read SPEC.md. Add pagination to listBookmarks:
      1. Accept page (default 1) and limit (default 20, max 100).
         Use SQL LIMIT/OFFSET. Compute total via COUNT(*).
         Return { bookmarks, total, page, limit }.
      2. Update GET /bookmarks to read ?page= and ?limit=.
      Make all tests pass — run bun test for full regression check.
    depends_on: [add-favorites, add-search, add-sorting]
    overrides:
      write-tests:
        prompt: >
          Read SPEC.md. Create test/pagination.test.ts. Import resetDb,
          createBookmark, listBookmarks, and "../src/server".
          Use beforeEach(() => resetDb()). Write a helper to seed N bookmarks.
          Write tests for:
          - First page returns correct number of items
          - Second page returns next items
          - Last page has remaining items
          - Page beyond results returns empty bookmarks but correct total
          - Default is page 1, limit 20
          - Limit clamped to max 100
          - GET /bookmarks?page=1&limit=5 endpoint works
          - Pagination combined with search/tag filters
      qa:
        prompt: >
          You are a QA engineer testing pagination. Start a fresh server:
          1. Start server: bun run start:bg
          2. Verify GET http://localhost:3457/health returns ok

          Test with curl:
          - Create 15 bookmarks with POST /bookmarks (use a loop)
          - GET /bookmarks?page=1&limit=5 — verify 5 results, total=15, page=1
          - GET /bookmarks?page=2&limit=5 — verify next 5 results
          - GET /bookmarks?page=3&limit=5 — verify last 5 results
          - GET /bookmarks?page=4&limit=5 — verify empty bookmarks, total still 15
          - GET /bookmarks (no params) — verify defaults (page=1, limit=20)
          - GET /bookmarks?limit=200 — verify limit clamped to 100
          - Combine: GET /bookmarks?q=searchterm&page=1&limit=3
          - Verify total reflects filtered count, not all bookmarks

          Run bun run stop when done. Return status: "passed" or "failed" with notes.
      eval:
        command: "bun test"
    budget:
      max_iterations: 5

  # ── Phase 6: Advanced features (parallel) ──

  - id: add-collections
    template: tdd-qa
    prompt: >
      Read SPEC.md. Implement collections:
      1. Add collections and bookmark_collections tables to src/db.ts
         (update resetDb to handle them).
      2. Create src/collections.ts with: createCollection, getCollection,
         listCollections, deleteCollection, addToCollection,
         removeFromCollection, getCollectionBookmarks (with pagination).
      3. Add endpoints to src/server.ts:
         POST/GET/DELETE /collections, POST/DELETE /collections/:id/bookmarks,
         GET /collections/:id/bookmarks.
      Make all tests in test/collections.test.ts pass.
    depends_on: [add-pagination]
    overrides:
      write-tests:
        prompt: >
          Read SPEC.md. Create test/collections.test.ts. Import resetDb,
          createBookmark, and "../src/server". Use beforeEach(() => resetDb()).
          Write tests for:
          - createCollection returns collection with id and name
          - createCollection rejects empty name
          - getCollection by id, returns null for missing
          - listCollections returns all collections
          - deleteCollection removes and returns true, false for missing
          - addToCollection / removeFromCollection work
          - getCollectionBookmarks returns paginated results
          - POST /collections creates collection (201)
          - GET /collections returns all
          - GET /collections/:id returns 200 or 404
          - DELETE /collections/:id returns 200 or 404
          - POST /collections/:id/bookmarks adds bookmark
          - DELETE /collections/:id/bookmarks/:bookmarkId removes
          - GET /collections/:id/bookmarks returns paginated list
      qa:
        prompt: >
          You are a QA engineer testing collections. Start a fresh server:
          1. Start server: bun run start:bg
          2. Verify GET http://localhost:3457/health returns ok

          Test with curl:
          - Create 2 collections: "Reading List" and "Dev Tools"
          - Create 5 bookmarks
          - Add 3 bookmarks to "Reading List", 2 to "Dev Tools"
          - GET /collections — verify both listed
          - GET /collections/:id/bookmarks — verify correct bookmarks in each
          - Add same bookmark to both collections — verify it appears in both
          - Remove a bookmark from a collection, verify it's gone but still in the other
          - Delete a collection, verify bookmarks still exist
          - GET /collections/:id for deleted collection — verify 404

          Run bun run stop when done. Return status: "passed" or "failed" with notes.
      eval:
        command: "bun test test/collections.test.ts"
    budget:
      max_iterations: 7

  - id: add-archive
    template: tdd
    prompt: >
      Read SPEC.md. Implement archiving (soft delete):
      1. Add is_archived column (INTEGER DEFAULT 0) to bookmarks table
         in src/db.ts. Update resetDb.
      2. Add archiveBookmark(id) and unarchiveBookmark(id) to src/bookmarks.ts.
         Update Bookmark type to include is_archived (boolean).
         Update listBookmarks to exclude archived by default, accept
         include_archived option.
      3. Add endpoints: POST /bookmarks/:id/archive, POST /bookmarks/:id/unarchive,
         GET /bookmarks?archived=true.
      Make all tests in test/archive.test.ts pass.
    depends_on: [add-pagination]
    overrides:
      write-tests:
        prompt: >
          Read SPEC.md. Create test/archive.test.ts. Import resetDb,
          createBookmark, archiveBookmark, unarchiveBookmark, listBookmarks,
          and "../src/server". Use beforeEach(() => resetDb()). Write tests for:
          - archiveBookmark sets is_archived to true
          - unarchiveBookmark sets it back to false
          - Returns null for missing bookmark
          - listBookmarks excludes archived by default
          - listBookmarks with include_archived shows them
          - POST /bookmarks/:id/archive endpoint (200 or 404)
          - POST /bookmarks/:id/unarchive endpoint (200 or 404)
          - GET /bookmarks?archived=true includes archived
      eval:
        command: "bun test test/archive.test.ts"
    budget:
      max_iterations: 5

  - id: add-url-validation
    template: tdd
    prompt: >
      Read SPEC.md. Add URL validation and duplicate detection:
      1. Update createBookmark in src/bookmarks.ts: validate URL format
         (must start with http:// or https://), trim whitespace, reject
         duplicate URLs (throw Error with "duplicate" in message).
      2. Update updateBookmark: validate format and check duplicates
         (excluding current bookmark) when url is changed.
      3. Update POST /bookmarks in src/server.ts: return 409 for duplicates,
         400 for invalid format.
      Make all tests in test/url-validation.test.ts pass.
    depends_on: [add-pagination]
    overrides:
      write-tests:
        prompt: >
          Read SPEC.md. Create test/url-validation.test.ts. Import resetDb,
          createBookmark, updateBookmark, and "../src/server".
          Use beforeEach(() => resetDb()). Write tests for:
          - Valid http:// URL accepted
          - Valid https:// URL accepted
          - Invalid URL rejected (no protocol, ftp://, plain text)
          - Duplicate URL rejected on create (throws)
          - Whitespace trimmed from URL
          - Update with duplicate URL rejected (excluding self)
          - POST /bookmarks returns 409 for duplicate URL
          - POST /bookmarks returns 400 for invalid format
      eval:
        command: "bun test test/url-validation.test.ts"
    budget:
      max_iterations: 5

  # ── Phase 7: Analytics & bulk (parallel) ──

  - id: add-bulk-ops
    template: tdd-qa
    prompt: >
      Read SPEC.md. Implement bulk import/export:
      1. Add POST /bookmarks/import to src/server.ts. Accept
         { bookmarks: [{url, title?, tags?}] }. Create each bookmark and add
         tags. Handle per-item errors. Return { imported, failed, errors }.
      2. Add GET /bookmarks/export. Return all non-archived bookmarks with
         their tags as { bookmarks: [{...bookmark, tags: string[]}] }.
      3. Route /bookmarks/import and /bookmarks/export BEFORE /bookmarks/:id
         to avoid "import"/"export" being parsed as an id.
      Make all tests in test/bulk-ops.test.ts pass.
    depends_on: [add-collections, add-archive]
    overrides:
      write-tests:
        prompt: >
          Read SPEC.md. Create test/bulk-ops.test.ts. Import resetDb,
          and "../src/server". Use beforeEach(() => resetDb()). Write tests for:
          - POST /bookmarks/import creates multiple bookmarks
          - Import with tags attaches tags to bookmarks
          - Import with some invalid URLs: valid ones succeed, invalid reported
          - Import response has { imported, failed, errors } counts
          - GET /bookmarks/export returns bookmarks with tags
          - Export excludes archived bookmarks
          - Empty import body returns zeros
          - Empty database export returns empty array
      qa:
        prompt: >
          You are a QA engineer testing bulk operations. Start a fresh server:
          1. Start server: bun run start:bg
          2. Verify GET http://localhost:3457/health returns ok

          Test with curl:
          - POST /bookmarks/import with 5 valid bookmarks (some with tags)
            Verify response: imported=5, failed=0
          - POST /bookmarks/import with mix of valid and invalid URLs
            Verify partial success: some imported, some failed with errors
          - POST /bookmarks/import with duplicate URLs from the first import
            Verify all fail as duplicates
          - GET /bookmarks/export — verify all bookmarks with tags included
          - Archive one bookmark, export again — verify archived excluded
          - Import empty array — verify imported=0, failed=0
          - Verify GET /bookmarks shows all imported bookmarks

          Run bun run stop when done. Return status: "passed" or "failed" with notes.
      eval:
        command: "bun test test/bulk-ops.test.ts"
    budget:
      max_iterations: 7

  - id: add-click-tracking
    template: tdd
    prompt: >
      Read SPEC.md. Implement click tracking:
      1. Add click_count (INTEGER DEFAULT 0) and last_clicked_at (TEXT NULL)
         columns to bookmarks in src/db.ts. Update resetDb.
      2. Add recordClick(id) → Bookmark | null to src/bookmarks.ts.
         Increment click_count, set last_clicked_at.
      3. Update Bookmark type with click_count and last_clicked_at.
      4. Add "click_count" to sort_by whitelist in listBookmarks.
      5. Add POST /bookmarks/:id/click to src/server.ts.
      Make all tests in test/click-tracking.test.ts pass.
    depends_on: [add-archive, add-url-validation]
    overrides:
      write-tests:
        prompt: >
          Read SPEC.md. Create test/click-tracking.test.ts. Import resetDb,
          createBookmark, recordClick, listBookmarks, getBookmark,
          and "../src/server". Use beforeEach(() => resetDb()). Write tests for:
          - recordClick increments click_count
          - Multiple clicks accumulate
          - last_clicked_at is set to a timestamp string
          - Returns null for missing bookmark
          - click_count appears in bookmark responses (getBookmark)
          - Sort by click_count works (listBookmarks with sort_by)
          - POST /bookmarks/:id/click endpoint (200 or 404)
      eval:
        command: "bun test test/click-tracking.test.ts"
    budget:
      max_iterations: 5

  # ── Phase 8: Final features ──

  - id: add-stats
    template: tdd-qa
    prompt: >
      Read SPEC.md. Add GET /stats endpoint to src/server.ts returning:
      - total_bookmarks (non-archived count)
      - total_archived
      - total_favorites (non-archived favorites)
      - total_tags (distinct tag count)
      - total_collections (collection count)
      - total_clicks (sum of click_count)
      - most_clicked: top 5 bookmarks by click_count [{id, title, url, click_count}]
      - recent_bookmarks: last 5 created [{id, title, url, created_at}]
      - top_tags: top 10 tags by count [{name, count}]

      Use efficient aggregate SQL queries. Make all tests in test/stats.test.ts pass.
    depends_on: [add-bulk-ops, add-click-tracking]
    overrides:
      write-tests:
        prompt: >
          Read SPEC.md. Create test/stats.test.ts. Import resetDb,
          createBookmark, and "../src/server". Import addTag from "../src/tags",
          archiveBookmark, toggleFavorite, recordClick from "../src/bookmarks".
          Use beforeEach(() => resetDb()). Write tests for:
          - GET /stats on empty database returns all zeros and empty arrays
          - total_bookmarks counts non-archived bookmarks
          - total_archived counts archived bookmarks
          - total_favorites counts non-archived favorites
          - total_clicks sums click_count across all bookmarks
          - most_clicked returns top 5 ordered by click_count descending
          - recent_bookmarks returns last 5 ordered by created_at descending
          - top_tags returns top 10 tags ordered by count descending
      qa:
        prompt: >
          You are a QA engineer testing the stats dashboard. Start a fresh server:
          1. Start server: bun run start:bg
          2. Verify GET http://localhost:3457/health returns ok

          Test with curl:
          - GET /stats on empty database — all zeros and empty arrays
          - Create 10 bookmarks, add various tags, favorite some, archive some
          - Click some bookmarks different numbers of times
          - GET /stats — verify all counts are correct:
            * total_bookmarks excludes archived
            * total_archived counts only archived
            * total_favorites counts non-archived favorites
            * total_clicks sums all click_count values
            * most_clicked is sorted by click_count desc, max 5
            * recent_bookmarks is sorted by created_at desc, max 5
            * top_tags is sorted by count desc, max 10

          Run bun run stop when done. Return status: "passed" or "failed" with notes.
      eval:
        command: "bun test test/stats.test.ts"
    budget:
      max_iterations: 7

  - id: add-notes
    template: tdd
    prompt: >
      Read SPEC.md. Implement notes:
      1. Add notes table to src/db.ts (id, bookmark_id FK, content, created_at).
         Update resetDb.
      2. Create src/notes.ts with:
         addNote(bookmarkId, content) → Note. Reject empty content. Verify
         bookmark exists.
         getNotes(bookmarkId) → Note[]. Ordered by created_at desc.
         deleteNote(noteId) → boolean.
      3. Add to src/server.ts:
         POST /bookmarks/:id/notes → 201 with Note, 400 or 404.
         GET /bookmarks/:id/notes → 200 with Note[].
         DELETE /notes/:id → 200 {deleted: true} or 404.
      Make all tests pass — run bun test for full regression check.
    depends_on: [add-stats]
    overrides:
      write-tests:
        prompt: >
          Read SPEC.md. Create test/notes.test.ts. Import resetDb,
          createBookmark from "../src/bookmarks", and "../src/server".
          Import addNote, getNotes, deleteNote from "../src/notes".
          Use beforeEach(() => resetDb()). Write tests for:
          - addNote creates note with id, bookmark_id, content, created_at
          - addNote rejects empty content (throws)
          - addNote rejects nonexistent bookmark (throws)
          - getNotes returns notes ordered newest first
          - Multiple notes on one bookmark
          - deleteNote removes and returns true
          - deleteNote returns false for missing note
          - Deleting bookmark cascades to delete its notes
          - POST /bookmarks/:id/notes creates note (201)
          - GET /bookmarks/:id/notes returns note array
          - DELETE /notes/:id removes note (200 or 404)
      eval:
        command: "bun test"
    budget:
      max_iterations: 5
