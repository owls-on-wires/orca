name: todo-api
project_dir: .
model: sonnet
scope:
  writable: ["src/**", "test/**", "migrations/**"]
  readable: ["**"]

templates:
  bugfix:
    actions: [develop, eval]
    types:
      develop:
        type: agent
        max_turns: 50
        toolset: all
        edges: { pass: next }
      eval:
        type: command
        command: "bun test"
        timeout: 30
        edges: { pass: complete, fail: first, timeout: first, error: first }

  feature:
    actions: [develop, eval]
    types:
      develop:
        type: agent
        max_turns: 80
        toolset: all
        edges: { pass: next }
      eval:
        type: command
        command: "bun test"
        timeout: 30
        edges: { pass: complete, fail: first, timeout: first, error: first }

# ─────────────────────────────────────────────────────────
# Dev Roadmap
# ─────────────────────────────────────────────────────────
#
# Phase 1: Fix existing bugs (parallel)
#   fix-validation    — createTodo should reject empty/whitespace titles
#   fix-update        — updateTodo completed field passes boolean not int
#   fix-server-post   — POST /todos should parse request body
#
# Phase 2: Add missing endpoints (depends on phase 1)
#   add-patch         — PATCH /todos/:id endpoint
#   add-delete        — DELETE /todos/:id endpoint
#
# Phase 3: New features (depends on phase 2)
#   add-filter        — GET /todos?completed=true|false filtering
#   add-search        — GET /todos?q=search query
#
# Phase 4: Polish (depends on phase 3)
#   add-pagination    — GET /todos?page=1&limit=10
# ─────────────────────────────────────────────────────────

tasks:
  # ── Phase 1: Bug fixes (parallel, no deps) ──

  - id: fix-validation
    template: bugfix
    prompt: >
      Fix the createTodo function in src/todos.ts so it validates the title
      parameter. It should throw an Error with message "Title is required"
      if the title is empty or whitespace-only. Use .trim() to check.
      The tests in test/todos.test.ts for "rejects empty title" and
      "rejects whitespace-only title" should pass.
    overrides:
      eval:
        command: "bun test test/todos.test.ts"
    budget:
      max_iterations: 5

  - id: fix-update
    template: bugfix
    prompt: >
      Fix the updateTodo function in src/todos.ts. The completed field
      is stored as INTEGER (0 or 1) in SQLite but the function receives
      a boolean. Make sure the UPDATE query converts boolean to integer
      correctly (true -> 1, false -> 0). The test "updateTodo toggles
      completed" in test/todos.test.ts should pass.
    overrides:
      eval:
        command: "bun test test/todos.test.ts"
    budget:
      max_iterations: 5

  - id: fix-server-post
    template: bugfix
    prompt: >
      Fix the POST /todos handler in src/server.ts. It currently ignores
      the request body and creates a todo with an empty title. It should:
      1. Parse the JSON request body with await req.json()
      2. Extract the title field
      3. Return 400 with {"error": "Title is required"} if title is empty
      4. Call createTodo(title) and return the result with status 201
      The tests in test/server.test.ts for POST should pass.
    overrides:
      eval:
        command: "bun test test/server.test.ts"
    budget:
      max_iterations: 5

  # ── Phase 2: Missing endpoints (depends on phase 1) ──

  - id: add-patch
    template: feature
    prompt: >
      Add the PATCH /todos/:id endpoint to src/server.ts. It should:
      1. Match PATCH requests to /todos/:id
      2. Parse the JSON body for {title?, completed?}
      3. Call updateTodo(id, updates)
      4. Return 404 if the todo doesn't exist
      5. Return the updated todo as JSON
      The PATCH tests in test/server.test.ts should pass.
    depends_on: [fix-validation, fix-update, fix-server-post]
    overrides:
      eval:
        command: "bun test test/server.test.ts"
    budget:
      max_iterations: 5

  - id: add-delete
    template: feature
    prompt: >
      Add the DELETE /todos/:id endpoint to src/server.ts. It should:
      1. Match DELETE requests to /todos/:id
      2. Call deleteTodo(id)
      3. Return 404 if the todo didn't exist (deleteTodo returns false)
      4. Return {"deleted": true} with status 200 on success
      The DELETE tests in test/server.test.ts should pass.
    depends_on: [fix-validation, fix-update, fix-server-post]
    overrides:
      eval:
        command: "bun test test/server.test.ts"
    budget:
      max_iterations: 5

  # ── Phase 3: New features (depends on phase 2) ──

  - id: add-filter
    template: feature
    prompt: >
      Add filtering to GET /todos in src/server.ts. Support a query
      parameter ?completed=true or ?completed=false that filters the
      results. Update the listTodos function in src/todos.ts to accept
      an optional filter parameter: listTodos(filter?: {completed?: boolean}).
      When the filter is provided, add a WHERE clause. Write tests in
      test/todos.test.ts for the filtering behavior.
    depends_on: [add-patch, add-delete]
    overrides:
      eval:
        command: "bun test test/todos.test.ts"
    budget:
      max_iterations: 5

  - id: add-search
    template: feature
    prompt: >
      Add search to GET /todos in src/server.ts. Support a query
      parameter ?q=searchterm that filters todos where the title
      contains the search term (case-insensitive). Update listTodos
      in src/todos.ts to accept a search parameter alongside the
      existing filter. Use SQL LIKE with % wildcards. Write tests
      in test/todos.test.ts for search behavior.
    depends_on: [add-patch, add-delete]
    overrides:
      eval:
        command: "bun test test/todos.test.ts"
    budget:
      max_iterations: 5

  # ── Phase 4: Polish (depends on phase 3) ──

  - id: add-pagination
    template: feature
    prompt: >
      Add pagination to GET /todos in src/server.ts. Support query
      parameters ?page=1&limit=10 (default page=1, limit=20, max
      limit=100). Update listTodos in src/todos.ts to accept
      pagination params and use SQL LIMIT/OFFSET. Return a wrapper
      object: {"todos": [...], "total": count, "page": n, "limit": n}.
      Write tests in test/todos.test.ts for pagination behavior
      including edge cases (page beyond results, limit=0).
    depends_on: [add-filter, add-search]
    overrides:
      eval:
        command: "bun test test/todos.test.ts"
    budget:
      max_iterations: 5
