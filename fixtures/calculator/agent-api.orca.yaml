name: calculator
project_dir: .
model: sonnet
scope:
  writable: ["src/**", "test/**"]
  readable: ["**"]

templates:
  bugfix:
    actions: [develop, eval]
    types:
      develop:
        type: agent-api
        max_turns: 50
        edges: { pass: next }
      eval:
        type: command
        command: "bun test"
        timeout: 30
        edges: { pass: complete, fail: first }

  feature:
    actions: [develop, eval]
    types:
      develop:
        type: agent-api
        max_turns: 80
        edges: { pass: next }
      eval:
        type: command
        command: "bun test"
        timeout: 30
        edges: { pass: complete, fail: first }

tasks:
  - id: fix-multiply
    template: bugfix
    prompt: >
      Fix the multiply function in src/multiply.ts. It currently returns
      a + b instead of a * b. The tests in test/multiply.test.ts should
      pass after the fix. Read the test file to understand what's expected.
    overrides:
      eval:
        command: "bun test test/multiply.test.ts"
    budget:
      max_iterations: 5

  - id: fix-divide
    template: bugfix
    prompt: >
      Fix the divide function in src/divide.ts to handle division by zero.
      Currently it returns Infinity when dividing by zero. It should throw
      an Error with the message "Cannot divide by zero". The tests in
      test/divide.test.ts should pass after the fix.
    overrides:
      eval:
        command: "bun test test/divide.test.ts"
    budget:
      max_iterations: 5

  - id: add-subtract
    template: feature
    prompt: >
      Add a subtract function. Create src/subtract.ts exporting a function
      subtract(a: number, b: number): number that returns a - b. Also
      create test/subtract.test.ts with at least 3 test cases following
      the pattern in test/add.test.ts.
    overrides:
      eval:
        command: "bun test test/subtract.test.ts"
    depends_on: [fix-multiply, fix-divide]
    budget:
      max_iterations: 5
